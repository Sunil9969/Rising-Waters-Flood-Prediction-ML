<!DOCTYPE html>
<html>
<head>
    <title>Rising Waters - Flood Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eaf4fb; text-align: center; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px #ccc; }
        input { margin: 8px; padding: 8px; width: 220px; }
        button { padding: 10px 20px; background: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rising Waters</h1>
        <h3>Flood Prediction System</h3>
        <form action="/predict" method="POST">
            <div><input type="number" step="any" name="AnnualRainfall" placeholder="Annual Rainfall (mm)" required></div>
            <div><input type="number" step="any" name="CloudVisibility" placeholder="Cloud Visibility (km)" required></div>
            <div><input type="number" step="any" name="Temperature" placeholder="Temperature (°C)" required></div>
            <div><input type="number" step="any" name="Humidity" placeholder="Humidity (%)" required></div>
            <div><input type="number" step="any" name="SeasonalRainfall" placeholder="Seasonal Rainfall (mm)" required></div>
            <button type="submit">Predict Flood Risk</button>
        </form>
    </div>
</body>
</html>
